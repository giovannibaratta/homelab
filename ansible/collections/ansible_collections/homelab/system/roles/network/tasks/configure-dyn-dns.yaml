---
- name: Add {{ ddclient_container_user }} user
  ansible.builtin.user:
    name: "{{ ddclient_container_user }}"
    comment: User used to run ddclient
    create_home: false
    shell: /usr/sbin/nologin
  register: ddclient_container_user_result

- name: Create ddclient directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0770"
    owner: "{{ ddclient_container_user }}"
    group: "{{ ddclient_container_user }}"
  with_items:
    - "{{ ddclient_conf_dir }}"
    - "{{ ddclient_work_dir }}"
    - "{{ ddclient_node_conf_dir }}"
    - "{{ ddclient_node_work_dir }}"

- name: Create ddclient network Quadlet
  containers.podman.podman_network:
    name: ddclient
    state: quadlet
    # Enable DNS resolution based on container names
    disable_dns: false
    dns: "{{ podman_dns }}"
    driver: bridge
    force: true
    recreate: true
    # Need to be reachable by Traefik
    internal: false
    interface_name: podman-ddclient
    opt:
      isolate: true
  notify:
    - Reload systemd daemons for network role
    - Restart ddclient network

- ansible.builtin.meta: flush_handlers

- name: Start ddclient network
  ansible.builtin.systemd_service:
    # The name is the name of the network + network suffix
    name: ddclient-network
    state: started
    enabled: true

- name: Configure shared ddclient (gateway nodes only)
  when: network_gateway_role is defined
  block:
    - name: Copy ddclient.conf file
      ansible.builtin.template:
        src: ddclient.conf.j2
        dest: "{{ ddclient_work_dir }}/ddclient.conf"
        mode: "0600"
        owner: "{{ ddclient_container_user }}"
        group: "{{ ddclient_container_user }}"
      notify:
        - Restart ddclient service

    - name: Copy ddclient.env file
      ansible.builtin.template:
        src: ddclient.env.j2
        dest: "{{ ddclient_conf_dir }}/ddclient.env"
        mode: "0640"
      notify:
        - Restart ddclient service

    - name: Create ddclient Quadlet
      containers.podman.podman_container:
        name: ddclient
        state: quadlet
        image: giovannibaratta/ddclient:{{ ddclient_version }}
        env_file: "{{ ddclient_conf_dir }}/ddclient.env"
        recreate: true
        network: ddclient

        # Use custom DNS server to avoid dependency on host DNS resolution
        dns:
          - 1.1.1.1
          - 8.8.8.8

        volumes: "{{ ddclient_work_dir }}:/config"

        uidmap:
          - 0:4000000000:1000
          - 1000:{{ ddclient_container_user_result.uid }}:1
          - 1001:4000001001:100000

        gidmap:
          - 0:4000000000:100000
          - +1000:@{{ ddclient_container_user_result.group }}:1

        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
            [Unit]
            StartLimitIntervalSec=0
            [Service]
            Restart=always
            RestartSec=60s
      notify:
        - Reload systemd daemons for network role
        - Restart ddclient service

- name: Clean up shared ddclient on non-gateway nodes
  when: network_gateway_role is not defined
  block:
    - name: Remove ddclient Quadlet file
      ansible.builtin.file:
        path: /etc/containers/systemd/ddclient.container
        state: absent
      register: ddclient_quadlet_removed

    - name: Reload systemd daemon if ddclient Quadlet removed
      ansible.builtin.systemd_service:
        daemon_reload: true
      when: ddclient_quadlet_removed.changed

    - name: Stop and disable ddclient service
      ansible.builtin.systemd_service:
        name: ddclient
        state: stopped
        enabled: false
      failed_when: false

- name: Copy ddclient-node.conf file
  ansible.builtin.template:
    src: ddclient.conf.j2
    dest: "{{ ddclient_node_work_dir }}/ddclient.conf"
    mode: "0600"
    owner: "{{ ddclient_container_user }}"
    group: "{{ ddclient_container_user }}"
  vars:
    network_dyn_dns_entry: "{{ inventory_hostname }}"
  notify:
    - Restart ddclient-node service

- name: Copy ddclient-node.env file
  ansible.builtin.template:
    src: ddclient.env.j2
    dest: "{{ ddclient_node_conf_dir }}/ddclient.env"
    mode: "0640"
  notify:
    - Restart ddclient-node service

- name: Create ddclient-node Quadlet
  containers.podman.podman_container:
    name: ddclient-node
    state: quadlet
    image: giovannibaratta/ddclient:{{ ddclient_version }}
    env_file: "{{ ddclient_node_conf_dir }}/ddclient.env"
    recreate: true
    network: ddclient
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes: "{{ ddclient_node_work_dir }}:/config"
    uidmap:
      - 0:4000000000:1000
      - 1000:{{ ddclient_container_user_result.uid }}:1
      - 1001:4000001001:100000
    gidmap:
      - 0:4000000000:100000
      - +1000:@{{ ddclient_container_user_result.group }}:1
    quadlet_options:
      - |
        [Install]
        WantedBy=default.target
        [Unit]
        StartLimitIntervalSec=0
        [Service]
        Restart=always
        RestartSec=60s
  notify:
    - Reload systemd daemons for network role
    - Restart ddclient-node service

- name: Trigger Handlers for ddclient
  ansible.builtin.meta: flush_handlers

# We keep the service stopped and disabled by default because it is 
# dynamically managed by the keepalived-nft-manager.sh script.
# Only the node in the "master" state will run ddclient to update the 
# shared DNS record.
- name: Disable shared ddclient service by default
  ansible.builtin.systemd_service:
    name: ddclient
    state: stopped
    enabled: false
  when: network_gateway_role is defined

- name: Start ddclient-node
  ansible.builtin.systemd_service:
    name: ddclient-node
    state: started
    enabled: true
