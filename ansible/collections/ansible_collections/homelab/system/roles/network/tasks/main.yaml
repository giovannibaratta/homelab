# multiple variables in the same block.
# https://community.bitwarden.com/t/bitwarden-lookup-plugin-for-ansible-causes-panick-errors-and-a-worker-was-found-in-a-dead-state/64579/7
# - name: Check required variables
#   fail:
#     msg: >
#       The variables 'wan_interface', 'pppoe_username', 'pppoe_password', 'internal_interface',
#       'internal_network_cidr', 'internal_gateway', 'internal_network_dhcp_start',
#       'internal_network_dhcp_end' are required.
#   when: >
#     wan_interface == '' or
#     internal_interface == '' or
#     pppoe_username == '' or
#     pppoe_password == '' or
#     internal_network == '' or
#     internal_network_netmask == '' or
#     internal_gateway == '' or
#     internal_network_dhcp_start == '' or
#     internal_network_dhcp_end == ''

# Disable systemd-networkd to prevent conflicts with Network Manager
- name: Network | Stop, disable, and mask systemd-networkd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
    daemon_reload: true
  loop:
    - systemd-networkd-wait-online.service
    - systemd-networkd.service

- name: Configure DNS
  ansible.builtin.import_tasks: configure-dns.yaml
  when: network_is_router

- name: Network | Install network-manager
  ansible.builtin.apt:
    name: network-manager
    state: present
    update_cache: true

- name: Network | Configure Network Manager
  ansible.builtin.copy:
    content: |
      [main]
      plugins=ifupdown,keyfile

      [ifupdown]
      managed=false

      [device]
      wifi.scan-rand-mac-address=no
    dest: /etc/NetworkManager/NetworkManager.conf
    mode: "0644"
  notify:
    - Restart NetworkManager service

- name: Network | Set ARP flux sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-arp-flux.conf
    state: present
    reload: true
  with_items:
    - { name: "net.ipv4.conf.all.arp_ignore", value: "1" }
    - { name: "net.ipv4.conf.default.arp_ignore", value: "1" }
    - { name: "net.ipv4.conf.all.arp_announce", value: "2" }
    - { name: "net.ipv4.conf.default.arp_announce", value: "2" }

- name: Network | Create bridge
  ansible.builtin.template:
    src: bridge.nmconnection.j2
    dest: /etc/NetworkManager/system-connections/{{ bridge_name }}.nmconnection
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service

- name: Network | Create drop-in directory for NetworkManager-wait-online
  ansible.builtin.file:
    path: /etc/systemd/system/NetworkManager-wait-online.service.d
    state: directory
    mode: "0755"

- name: Network | Configure NetworkManager-wait-online to wait only for {{ bridge_name }}
  ansible.builtin.copy:
    dest: /etc/systemd/system/NetworkManager-wait-online.service.d/override.conf
    content: |
      [Service]
      # Clear the default ExecStart (required by systemd to override)
      ExecStart=

      # 2. Run the wait loop with a 120s fail-safe
      # If 120s passes, 'timeout' kills the loop and exits with status 124
      ExecStart=/usr/bin/timeout 120s /usr/bin/bash -c 'while ! nmcli -t -f GENERAL.STATE device show {{ bridge_name }} 2>/dev/null | grep -q "100"; do sleep 2; done'

      # 3. Ensure systemd itself doesn't kill the process before our 120s timer is up
      TimeoutStartSec=130s

    mode: "0644"
  notify:
    - Reload systemd daemon

- name: Network | Create internal interface
  ansible.builtin.copy:
    content: |
      [connection]
      id={{ internal_interface }}
      uuid=3e20c816-61a6-30e8-9cc7-cc3f2ef80ffb
      type=ethernet
      interface-name={{ internal_interface }}
      master={{ bridge_name }}
      autoconnect=true
      autoconnect-retries=0
      slave-type=bridge
    dest: /etc/NetworkManager/system-connections/internal-interface.nmconnection
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service

- name: Network | Create managed devices
  ansible.builtin.copy:
    content: |
      # 1. Forcefully unmanage CNI and container interfaces
      [device-unmanaged-containers]
      match-device=interface-name:cilium*;interface-name:lxc*;interface-name:podman*
      managed=0

      # 2. Unmanage all random container veth interfaces...
      [device-unmanaged-veths]
      match-device=interface-name:veth*
      managed=0

      # 3. ...but EXPLICITLY manage custom veth interface
      [device-managed-custom]
      match-device=interface-name:veth-k8s-br;interface-name:k8s-cp;interface-name:k8s-bridge-plug
      managed=1
    dest: /etc/NetworkManager/conf.d/10-globally-managed-devices.conf
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service

- name: Flush handlers to restart NetworkManager
  ansible.builtin.meta: flush_handlers

- name: Configure PPPOE over VLAN connection
  when: network_is_router
  block:
    - name: Create VLAN config
      ansible.builtin.copy:
        content: |
          [connection]
          id=vlan
          type=vlan
          interface-name={{ bridge_name }}.835
          autoconnect=true
          autoconnect-retries=0

          [vlan]
          id=835
          parent={{ bridge_name }}
          flags=1

          [ipv4]
          method=disabled

          [ipv6]
          method=ignore
          addr-gen-mode=default

          [ethernet]

          [proxy]
        dest: /etc/NetworkManager/system-connections/vlan.nmconnection
        mode: "0600"

    - name: Create PPPOE connection config
      ansible.builtin.copy:
        content: |
          [connection]
          id=pppoe-ftth
          type=pppoe
          interface-name=ftth
          autoconnect=true
          autoconnect-retries=0

          [ipv4]
          method=auto

          [ipv6]
          method=auto
          addr-gen-mode=default

          [ethernet]

          [pppoe]
          parent={{ bridge_name }}.835
          password="{{ pppoe_password }}"
          username="{{ pppoe_username }}"

          [proxy]
        dest: /etc/NetworkManager/system-connections/pppoe.nmconnection
        mode: "0600"

    # Required for VLAN tagging
    - name: Load kernel module 8021q
      community.general.modprobe:
        name: 8021q
        state: present

    - name: Create /etc/modules-load.d/8021q.conf
      ansible.builtin.copy:
        content: 8021q
        dest: /etc/modules-load.d/8021q.conf
        mode: "0644"

    - name: Install iproute2
      ansible.builtin.apt:
        name: iproute2
        state: present
        update_cache: true

    - name: Flush handlers to restart NetworkManager
      ansible.builtin.meta: flush_handlers

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_file: /etc/sysctl.d/20-ip-forward.conf
        state: present
        reload: true

- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true

- name: Install conntrack
  ansible.builtin.apt:
    name: conntrack
    state: present
    update_cache: true

- name: Create /app/nftables-geoip
  ansible.builtin.file:
    path: /app/nftables-geoip
    state: directory
    mode: "0700"

- name: Network | Ensure nftables ip-lists directory exists
  ansible.builtin.file:
    path: /app/nftables-geoip/ip-lists
    state: directory
    mode: "0700"

- name: Clone nftables-geoip
  ansible.builtin.git:
    repo: https://github.com/pvxe/nftables-geoip.git
    dest: /app/nftables-geoip/repo
    single_branch: true
    version: master
    force: true

- name: Install packages
  ansible.builtin.package:
    # Required by nftables-geoip
    name: "python3-requests"
    state: present

- name: Generate list of allowed IPs
  ansible.builtin.shell: |
    /app/nftables-geoip/repo/nft_geoip.py --download -c es,fr,pt,it,de,ie,gb,ch,se,no,us --output-dir /app/nftables-geoip/ip-lists --file-location /app/nftables-geoip/repo/location.csv

- name: Create override directory for nftables service
  ansible.builtin.file:
    path: /etc/systemd/system/nftables.service.d
    state: directory
    mode: "0755"

- name: Ensure that nftables start after file system has been mounted
  ansible.builtin.template:
    src: nftables.service.override.conf.j2
    dest: "/etc/systemd/system/nftables.service.d/override.conf"
    mode: "0600"

- name: Reload systemd daemons for nftables
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Ensure required packages are installed
  ansible.builtin.package:
    name:
      - curl
      - jq
    state: present

- name: Network | Ensure UptimeRobot IPs directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  with_items:
    - "{{ __uptime_robot_dir }}"
    - "{{ __uptime_robot_dir }}/ip-lists"

- name: Network | UptimeRobot facts
  ansible.builtin.set_fact:
    __uptime_robot_ntf_ips_file: "{{ __uptime_robot_dir }}/ip-lists/uptimerobot-ips-elements.nft"

- name: Network | Touch placeholder for UptimeRobot IPs to prevent include errors
  ansible.builtin.copy:
    content: ""
    dest: "{{ __uptime_robot_ntf_ips_file }}"
    force: no # Do not overwrite if the file already exists
    mode: "0600"

- name: Network | Deploy UptimeRobot IP updater script
  ansible.builtin.template:
    src: update-uptime-robots-ips.sh.j2
    dest: "{{ __uptime_robot_dir }}/update-uptimerobot-ips.sh"
    mode: "0700"

- name: Network | Execute script to populate IPs initially
  ansible.builtin.command: "{{ __uptime_robot_dir }}/update-uptimerobot-ips.sh"
  register: uptimerobot_init
  changed_when: uptimerobot_init.rc == 0
  failed_when: false # Continue even if UptimeRobot API is temporarily down

- name: Network | Setup Cron job to update UptimeRobot IPs periodically
  ansible.builtin.cron:
    name: "Update UptimeRobot IPs for nftables"
    job: "{{ __uptime_robot_dir }}/update-uptimerobot-ips.sh >/dev/null 2>&1"
    special_time: daily

- name: Copy nftables shared rules
  ansible.builtin.blockinfile:
    path: /etc/nftables.conf
    backup: true
    create: true
    insertbefore: EOF
    block: "{{ lookup('template', 'nftables-rules.j2') }}"

- name: Copy nftables VIP rules
  block:
    - name: Render nftables VIP rules (MASTER)
      ansible.builtin.template:
        src: nftables-vip-rules.master.j2
        dest: /etc/nftables-vip-rules.master.nft
        backup: true

    - name: Render nftables VIP rules (BACKUP)
      ansible.builtin.template:
        src: nftables-vip-rules.backup.j2
        dest: /etc/nftables-vip-rules.backup.nft
        backup: true

- name: Reload nftables
  ansible.builtin.command: nft -f /etc/nftables.conf

- name: Enable nftables on boot
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

- name: Configure DHCP
  ansible.builtin.import_tasks: dhcp/configure-dhcp.yaml

- name: SSH hardening
  ansible.builtin.import_tasks: hardening-ssh.yaml

- name: Dynamic DNS
  ansible.builtin.import_tasks: configure-dyn-dns.yaml
  when: network_is_router

- name: Configure VRRP
  ansible.builtin.import_tasks: vrrp.yaml
  when: network_is_router and network_gateway_role is defined

- name: Disable VRRP if role is not defined
  when: network_is_router and network_gateway_role is not defined
  block:
    - name: Network | Populate service facts
      ansible.builtin.service_facts:

    - name: Network | Disable keepalived service if present
      ansible.builtin.service:
        name: keepalived
        enabled: false
        state: stopped
      when: "'keepalived.service' in services"

- name: Configure K8s network resources
  ansible.builtin.import_tasks: k8s.yaml
