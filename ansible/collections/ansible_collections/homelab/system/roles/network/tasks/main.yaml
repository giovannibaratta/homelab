- name: Ensure systemd-networkd-wait-online waits for the right interface
  ansible.builtin.lineinfile:
    path: /usr/lib/systemd/system/systemd-networkd-wait-online.service
    regexp: ^ExecStart.+
    line: /usr/lib/systemd/systemd-networkd-wait-online --interface={{ bridge_name }}

- name: Configure DNS
  ansible.builtin.import_tasks: configure-dns.yaml
  when: network_is_router

- name: Network | Install network-manager
  ansible.builtin.apt:
    name: network-manager
    state: present
    update_cache: true

- name: Network | Configure Network Manager
  ansible.builtin.copy:
    content: |
      [main]
      plugins=ifupdown,keyfile
      monitor-connection-files=yes

      [ifupdown]
      managed=false

      [device]
      wifi.scan-rand-mac-address=no
    dest: /etc/NetworkManager/NetworkManager.conf
    mode: "0644"
  notify:
    - Restart NetworkManager service

- name: Network | Create bridge
  ansible.builtin.template:
    src: bridge.nmconnection.j2
    dest: /etc/NetworkManager/system-connections/{{ bridge_name }}.nmconnection
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service


- name: Network | Create internal interface
  ansible.builtin.copy:
    content: |
      [connection]
      id={{ internal_interface }}
      uuid=3e20c816-61a6-30e8-9cc7-cc3f2ef80ffb
      type=ethernet
      interface-name={{ internal_interface }}
      master={{ bridge_name }}
      slave-type=bridge
    dest: /etc/NetworkManager/system-connections/internal-interface.nmconnection
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service


- name: Network | Create managed devices
  ansible.builtin.copy:
    content: |
      [main]
      managed=true

      [device]
      match-device=*
      managed=1
    dest: /etc/NetworkManager/conf.d/10-globally-managed-devices.conf
    mode: "0600"
    backup: true
  notify:
    - Restart NetworkManager service

- name: Flush handlers to restart NetworkManager
  ansible.builtin.meta: flush_handlers

- name: Configure PPPOE over VLAN connection
  when: network_is_router
  block:
    - name: Create VLAN config
      ansible.builtin.copy:
        content: |
          [connection]
          id=vlan
          type=vlan
          interface-name={{ bridge_name }}.835
          autoconnect=true
          autoconnect-retries=0

          [vlan]
          id=835
          parent={{ bridge_name }}
          flags=1

          [ipv4]
          method=disabled

          [ipv6]
          method=ignore
          addr-gen-mode=default

          [ethernet]

          [proxy]
        dest: /etc/NetworkManager/system-connections/vlan.nmconnection
        mode: "0600"

    - name: Create PPPOE connection config
      ansible.builtin.copy:
        content: |
          [connection]
          id=pppoe-ftth
          type=pppoe
          interface-name=ftth
          autoconnect=true
          autoconnect-retries=0

          [ipv4]
          method=auto

          [ipv6]
          method=auto
          addr-gen-mode=default

          [ethernet]

          [pppoe]
          parent={{ bridge_name }}.835
          password="{{ pppoe_password }}"
          username="{{ pppoe_username }}"

          [proxy]
        dest: /etc/NetworkManager/system-connections/pppoe.nmconnection
        mode: "0600"

    # Required for VLAN tagging
    - name: Load kernel module 8021q
      community.general.modprobe:
        name: 8021q
        state: present

    - name: Create /etc/modules-load.d/8021q.conf
      ansible.builtin.copy:
        content: 8021q
        dest: /etc/modules-load.d/8021q.conf
        mode: "0644"

    - name: Install iproute2
      ansible.builtin.apt:
        name: iproute2
        state: present
        update_cache: true

    - name: Flush handlers to restart NetworkManager
      ansible.builtin.meta: flush_handlers

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_file: /etc/sysctl.d/20-ip-forward.conf
        state: present
        reload: true

- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true

- name: Install conntrack
  ansible.builtin.apt:
    name: conntrack
    state: present
    update_cache: true

- name: Create /app/nftables-geoip
  ansible.builtin.file:
    path: /app/nftables-geoip
    state: directory
    mode: "0700"

- name: Create /app/nftables-geoip/ip-lists
  ansible.builtin.file:
    path: /app/nftables-geoip/ip-lists
    state: directory
    mode: "0700"

- name: Clone nftables-geoip
  ansible.builtin.git:
    repo: https://github.com/pvxe/nftables-geoip.git
    dest: /app/nftables-geoip/repo
    single_branch: true
    version: master
    force: true

- name: Install packages
  ansible.builtin.package:
    # Required by nftables-geoip
    name: "python3-requests"
    state: present

- name: Generate list of allowed IPs
  ansible.builtin.shell: |
    /app/nftables-geoip/repo/nft_geoip.py --download -c es,fr,pt,it,de,ie,gb,ch,se,no,us --output-dir /app/nftables-geoip/ip-lists --file-location /app/nftables-geoip/repo/location.csv

- name: Create override directory for nftables service
  ansible.builtin.file:
    path: /etc/systemd/system/nftables.service.d
    state: directory
    mode: "0755"

- name: Ensure that nftables start after file system has been mounted
  ansible.builtin.template:
    src: nftables.service.override.conf.j2
    dest: "/etc/systemd/system/nftables.service.d/override.conf"
    mode: "0600"

- name: Reload systemd daemons for nftables
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Copy nftables shared rules
  ansible.builtin.blockinfile:
    path: /etc/nftables.conf
    backup: true
    create: true
    insertbefore: EOF
    block: "{{ lookup('template', 'nftables-rules.j2') }}"

- name: Copy nftables VIP rules
  block:
    - name: Render nftables VIP rules (MASTER)
      ansible.builtin.template:
        src: nftables-vip-rules.master.j2
        dest: /etc/nftables-vip-rules.master.nft
        backup: true

    - name: Render nftables VIP rules (BACKUP)
      ansible.builtin.template:
        src: nftables-vip-rules.backup.j2
        dest: /etc/nftables-vip-rules.backup.nft
        backup: true

- name: Reload nftables
  ansible.builtin.command: nft -f /etc/nftables.conf

- name: Enable nftables on boot
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

- name: Configure DHCP
  ansible.builtin.import_tasks: dhcp/configure-dhcp.yaml

- name: SSH hardening
  ansible.builtin.import_tasks: hardening-ssh.yaml

- name: Dynamic DNS
  ansible.builtin.import_tasks: configure-dyn-dns.yaml
  when: network_is_router and dyn_dns_entry is defined

- name: Configure VRRP
  ansible.builtin.import_tasks: vrrp.yaml
  when: network_is_router and network_gateway_role is defined
