---
- name: Validate Cloudflare tunnel token
  ansible.builtin.fail:
    msg: "cloudflare_tunnel_token must be defined and not empty!"
  when: cloudflare_tunnel_token is not defined or cloudflare_tunnel_token | length == 0

- name: Download Cloudflare GPG key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
    dest: /usr/share/keyrings/cloudflare-public-v2.gpg
    mode: '0644'

- name: Add Cloudflare repository to sources
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main"
    filename: cloudflared
    state: present

- name: Install cloudflared daemon package
  ansible.builtin.apt:
    name: cloudflared
    state: present
    update_cache: true

- name: Manage cloudflared systemd service unit
  ansible.builtin.template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    mode: '0644'
  notify: Reload systemd and restart cloudflared
