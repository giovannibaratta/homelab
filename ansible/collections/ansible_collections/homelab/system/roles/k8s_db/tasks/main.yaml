---
- name: CloudNativePG | Deploy CloudNativePG Operator
  ansible.builtin.import_tasks: deploy_operator.yaml
  run_once: true

- name: CloudNativePG | Apply storage class
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'storage-class.yaml') | from_yaml }}"
  run_once: true

- name: CloudNativePG | Ensure the cluster namespace exists.
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ k8s_db_cluster_namespace }}"
    state: present
  run_once: true

- name: CloudNativePG | Validate k8s_db_clusters configuration
  run_once: true
  block:
    - name: CloudNativePG | Ensure k8s_db_clusters is defined and is a list
      ansible.builtin.assert:
        that:
          - k8s_db_clusters is defined
          - k8s_db_clusters | type_debug == 'list'
        fail_msg: "The variable 'k8s_db_clusters' must be defined as a list."

    - name: CloudNativePG | Validate that all cluster names are unique
      ansible.builtin.assert:
        that:
          - (k8s_db_clusters | map(attribute='name') | unique | length) == (k8s_db_clusters | length)
        fail_msg: "Cluster names in 'k8s_db_clusters' must be unique!"

    - name: CloudNativePG | Validate name and storage_size for each cluster
      ansible.builtin.assert:
        that:
          # --- Name Validations ---
          - item.name is defined
          - item.name | length > 0
          - item.name | length <= 20
          - item.name is match('^[a-zA-Z0-9]+[a-zA-Z0-9-]*[a-zA-Z0-9]$')

          # --- Storage Size Validations ---
          - item.storage_size is defined
          - "'G' in item.storage_size"
          - (item.storage_size | regex_replace('[a-zA-Z]', '') | int) > 0
          - (item.storage_size | regex_replace('[a-zA-Z]', '') | int) < 50
        fail_msg: >
          Validation failed for cluster '{{ item.name | default("unknown") }}'.
          Rules:
          1. Name must be 1-20 characters long and contain ONLY alphanumeric characters (a-z, A-Z, 0-9).
          2. Storage size must include 'G' or 'Gi', and be strictly > 0 and < 50.
      loop: "{{ k8s_db_clusters }}"
      loop_control:
        label: "{{ item.name }}"

- name: CloudNativePG | Create local storage directories on each node for each cluster
  when: "'kube_node' in group_names"
  ansible.builtin.file:
    path: "/app/k8s-db-{{ item.name }}"
    state: directory
    owner: root
    group: 26
    mode: '0770'
  loop: "{{ k8s_db_clusters }}"
  loop_control:
    label: "{{ item.name }}"

- name: CloudNativePG | Render and apply local Persistent Volumes for all clusters across all nodes
  run_once: true
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'persistent-volume.yaml.j2') | from_yaml }}"
  # For each node in the cluster, we need to crate a PV that points to the local storage on that node.
  # We can achieve this by looping over the product of the list of clusters and the list of nodes.
  loop: "{{ k8s_db_clusters | product(groups['kube_node']) | list }}"
  loop_control:
    label: "pv-{{ item[0].name }}-{{ item[1] }}"
  vars:
    # item[0] represents the current cluster dictionary from k8s_db_clusters
    # item[1] represents the current node name from groups['kube_node']
    __k8s_db_node_name: "{{ item[1] }}"
    __k8s_db_storage_size: "{{ item[0].storage_size }}"
    __k8s_db_storage_path: "/app/k8s-db-{{ item[0].name }}" 
    __k8s_db_cluster_name: "{{ item[0].name }}"

- name: CloudNativePG | Create database credentials secret for each cluster
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'credentials.yaml.j2') | from_yaml }}"
  loop: "{{ k8s_db_clusters }}"
  no_log: true
  run_once: true
  vars:
    __k8s_db_cluster_name: "{{ item.name }}"
    __k8s_db_db_user: "{{ item.username }}"
    __k8s_db_db_password: "{{ item.password }}"

- name: CloudNativePG | Render and apply Cluster manifest for each cluster
  run_once: true
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'cluster.yaml.j2') | from_yaml }}"
  loop: "{{ k8s_db_clusters }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    __k8s_db_cluster_name: "{{ item.name }}"
    __k8s_db_storage_size: "{{ item.storage_size }}"
    __k8s_db_db_user: "{{ item.username }}"
    __k8s_db_secret_name: "{{ __k8s_db_cluster_name }}-credentials"
    __k8s_db_resources: "{{ item.resources if item.resources is defined else omit }}"
    __k8s_db_priority_class_name: "{{ item.priority_class_name if item.priority_class_name is defined else omit }}"