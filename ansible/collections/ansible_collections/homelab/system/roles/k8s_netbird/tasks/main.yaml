---
- name: K8s Netbird | Ensure namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ k8s_netbird_namespace }}"
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged

- name: K8s Netbird | Deploy Exit Node client
  when: k8s_netbird_deploy_exit_node
  block:
    - name: K8s Netbird | Create Exit Node Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: netbird-exit-node-secret
            namespace: "{{ k8s_netbird_namespace }}"
          stringData:
            setup-key: "{{ vpn_exit_node_setup_key }}"

    - name: K8s Netbird | Apply Exit Node Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'client-node.yaml.j2') | from_yaml_all }}"
      vars:
        netbird_node_name: exit-node
        netbird_node_version: "{{ k8s_netbird_exit_node_version }}"
        netbird_node_hostname: "netbird-exit-node-k8s"
        netbird_node_interface: "wt-exit"

- name: K8s Netbird | Deploy Jump Node client
  when: k8s_netbird_deploy_jump_node
  block:
    - name: K8s Netbird | Create Jump Node Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: netbird-jump-node-secret
            namespace: "{{ k8s_netbird_namespace }}"
          stringData:
            setup-key: "{{ vpn_jump_node_setup_key }}"

    - name: K8s Netbird | Apply Jump Node Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'client-node.yaml.j2') | from_yaml_all }}"
      vars:
        netbird_node_name: jump-node
        netbird_node_version: "{{ k8s_netbird_jump_node_version }}"
        netbird_node_hostname: "netbird-jump-node-k8s"
        netbird_node_interface: "wt-jump"

- name: K8s Netbird | Deploy Dashboard
  when: k8s_netbird_deploy_dashboard
  block:
    - name: K8s Netbird | Apply Dashboard Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'dashboard.yaml.j2') | from_yaml_all }}"

- name: K8s Netbird | Deploy Signal
  when: k8s_netbird_deploy_signal
  block:
    - name: K8s Netbird | Apply Signal Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'signal.yaml.j2') | from_yaml_all }}"

- name: K8s Netbird | Deploy Secrets
  when: k8s_netbird_deploy_management or k8s_netbird_deploy_relay
  block:
    - name: K8s Netbird | Create Core Secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: netbird-core-secrets
            namespace: "{{ k8s_netbird_namespace }}"
          stringData:
            mgmt-encryption-key: "{{ vpn_mgmt_datastore_env_key }}"
            relay-secret: "{{ vpn_relay_secret }}"
            idp-client-secret: "{{ vpn_netbird_idp_client_secret }}"

- name: K8s Netbird | Deploy Management Server
  when: k8s_netbird_deploy_management
  block:
    - name: K8s Netbird | Create Management JSON Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: netbird-mgmt-config
            namespace: "{{ k8s_netbird_namespace }}"
          type: Opaque
          stringData:
            management.json: "{{ lookup('template', 'netbird-mgmt.json.j2') | to_nice_json }}"

    - name: K8s Netbird | Apply Management Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'management.yaml.j2') | from_yaml_all }}"

- name: K8s Netbird | Deploy Relay Server
  when: k8s_netbird_deploy_relay
  block:
    - name: K8s Netbird | Apply Relay Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'relay.yaml.j2') | from_yaml_all }}"

- name: K8s Netbird | Deploy Coturn (STUN) Server
  when: k8s_netbird_deploy_coturn
  block:
    - name: K8s Netbird | Apply Coturn Manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'coturn.yaml.j2') | from_yaml_all }}"

- name: K8s Netbird | Manage ad-hoc host Traefik router
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  ansible.builtin.template:
    src: host-traefik.yaml.j2
    dest: /app/traefik/conf/dynamic/netbird-k8s.yaml
    owner: root
    group: root
    mode: "0644"
  when: k8s_netbird_deploy_dashboard or k8s_netbird_deploy_signal or k8s_netbird_deploy_management or k8s_netbird_deploy_relay

- name: K8s Netbird | Remove ad-hoc host Traefik router
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  ansible.builtin.file:
    path: /app/traefik/conf/dynamic/netbird-k8s.yaml
    state: absent
  when: not k8s_netbird_deploy_dashboard and not k8s_netbird_deploy_signal and not k8s_netbird_deploy_management and not k8s_netbird_deploy_relay

- name: K8s Netbird | Clean up legacy dashboard route file
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  ansible.builtin.file:
    path: /app/traefik/conf/dynamic/netbird-dashboard-k8s.yaml
    state: absent
