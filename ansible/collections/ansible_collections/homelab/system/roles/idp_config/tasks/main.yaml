---
- name: IDP Config | Validate required variables
  ansible.builtin.assert:
    that:
      - idp_config_jwt_json is defined and idp_config_jwt_json | string | length > 0
      - idp_terraform_state_endpoint is defined and idp_terraform_state_endpoint | string | length > 0
      - idp_terraform_state_access is defined and idp_terraform_state_access | string | length > 0
      - idp_terraform_state_secret is defined and idp_terraform_state_secret | string | length > 0
    fail_msg: "CRITICAL: Required configuration variables (idp_config_jwt_json, idp_terraform_state_endpoint, idp_terraform_state_access, idp_terraform_state_secret) must be defined and not empty!"

- name: IDP Config | Create Terraform directories
  ansible.builtin.file:
    path: "{{ idp_config_terraform_dir }}"
    state: directory
    mode: "0700"

- name: IDP Config | Copy Terraform module to host
  ansible.posix.synchronize:
    src: files/terraform/
    dest: "{{ idp_config_terraform_dir }}/"
    delete: true
    group: false
    owner: false
    perms: false
    times: false
    rsync_opts:
      - "--no-motd"
      - "--exclude='.terraform'"
      - "--exclude='terraform.tfstate'"
      - "--exclude='terraform.tfstate.backup'"
      - "--exclude='terraform.tfvars'"

- name: IDP Config | Pre-validate idp_dynamic_apps structure
  ansible.builtin.assert:
    that:
      - item.name is defined and item.name | string | length > 0
      - item.redirect_uris is defined and item.redirect_uris is iterable and item.redirect_uris is not string and item.redirect_uris | length > 0
    fail_msg: "idp_dynamic_apps item is invalid: name must be a non-empty string, and redirect_uris must be a non-empty list of URIs."
  loop: "{{ idp_dynamic_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: idp_dynamic_apps is defined

- name: IDP Config | Render dynamic Terraform module
  ansible.builtin.template:
    src: dynamic_apps.tf.j2
    dest: "{{ idp_config_terraform_dir }}/dynamic_apps.tf"
  when: idp_dynamic_apps is defined and idp_dynamic_apps | length > 0

- name: IDP Config | Render backend configuration
  ansible.builtin.template:
    src: backend.tf.j2
    dest: "{{ idp_config_terraform_dir }}/backend.tf"

- name: IDP Config | Apply Terraform to configure Zitadel
  community.general.terraform:
    project_path: "{{ idp_config_terraform_dir }}"
    check_destroy: true
    state: present
    complex_vars: true
    force_init: true
    variables:
      app_domain: "{{ internal_domain }}"
      zitadel_instance:
        host: "{{ idp_config_external_domain }}"
        port: "{{ idp_config_external_port }}"
        jwt_json: "{{ idp_config_jwt_json | to_json }}"
  environment:
    AWS_ACCESS_KEY_ID: "{{ idp_terraform_state_access }}"
    AWS_SECRET_ACCESS_KEY: "{{ idp_terraform_state_secret }}"
  register: idp_zitadel_terraform_output
  retries: 5
  delay: 60
  no_log: true
