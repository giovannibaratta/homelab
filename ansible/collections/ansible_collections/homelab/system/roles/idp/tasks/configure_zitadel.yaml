---
- name: Create zitadel directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  with_items:
    - "{{ idp_zitadel_conf_dir }}/terraform"

- name: Copy Terraform module
  ansible.posix.synchronize:
    src: files/terraform/
    dest: "{{ idp_zitadel_conf_dir }}/terraform/"
    delete: true
    group: false
    owner: false
    perms: false
    times: false
    rsync_opts:
      - "--no-motd"
      - "--exclude='.terraform'"
      - "--exclude='terraform.tfstate'"
      - "--exclude='terraform.tfstate.backup'"
      - "--exclude='terraform.tfvars'"

- name: Pre-validate idp_dynamic_apps structure
  ansible.builtin.assert:
    that:
      - item.name is defined and item.name | string | length > 0
      - item.redirect_uris is defined and item.redirect_uris is iterable and item.redirect_uris is not string and item.redirect_uris | length > 0
    fail_msg: "idp_dynamic_apps item is invalid: name must be a non-empty string, and redirect_uris must be a non-empty list of URIs. Item: {{ item }}"
  loop: "{{ idp_dynamic_apps | default([]) }}"
  when: idp_dynamic_apps is defined
  run_once: true

- name: Render dynamic Terraform module
  ansible.builtin.template:
    src: dynamic_apps.tf.j2
    dest: "{{ idp_zitadel_conf_dir }}/terraform/dynamic_apps.tf"
  when: idp_dynamic_apps is defined and idp_dynamic_apps | length > 0

- name: Apply Terraform to configure Zitadel
  community.general.terraform:
    project_path: "{{ idp_zitadel_conf_dir }}/terraform/"
    check_destroy: true
    state: present
    complex_vars: true
    force_init: true
    variables:
      app_domain: "{{ internal_domain }}"
      zitadel_instance:
        host: "idp.{{ internal_domain }}"
        # Port is 8443 because traffic is generated from the remote host to itself and the NAT
        # is not applied
        port: "8443"
        jwt_path: "{{ idp_zitadel_conf_dir }}/machinekey/zitadel-admin-sa.json"
  register: idp_zitadel_terraform_output
  retries: 5
  delay: 60