---
- name: Gather the list of installed systemd services
  ansible.builtin.service_facts:

- name: Disable BIND9 and its variants if they exist
  block:
    # List of common service names for BIND on Debian/Ubuntu systems.
    # 'bind9' is the main service unit, 'named' is often a symlink or alias.
    # Other variations are less common but included for completeness.
    - name: Stop and disable BIND services
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - named
        - bind9
        - named-chroot
      when: "item in ansible_facts.services"

  rescue:
    - name: BIND service check resulted in an error (informational)
      ansible.builtin.debug:
        msg: "Could not disable one of the BIND services, which is expected if it was not installed. No action needed."

- name: Create /app/adguardhome/work directory
  ansible.builtin.file:
    path: /app/adguardhome/work
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Create /app/adguardhome/conf directory
  ansible.builtin.file:
    path: /app/adguardhome/conf
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Copy AdGuardHome.yaml configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: /app/adguardhome/conf/AdGuardHome.yaml
    mode: "0600"
    owner: root
    group: root
    backup: yes
  notify: Restart AdGuard Home service

- name: Create adguardhome Quadlet
  containers.podman.podman_container:
    name: adguardhome
    image: "docker.io/adguard/adguardhome:{{ adguard_version }}"
    state: quadlet
    recreate: true

    volumes:
      - "/app/adguardhome/work:/opt/adguardhome/work"
      - "/app/adguardhome/conf:/opt/adguardhome/conf"

    ports:
      - "{{ internal_ip_address }}:53:53/tcp"
      - "{{ internal_ip_address }}:53:53/udp"

    labels:
      traefik.enable: "true"

      # Web interface
      traefik.http.routers.adguard.rule: "Host(`adguard.{{ internal_domain }}`)"
      traefik.http.routers.adguard.entrypoints: "websecure"
      traefik.http.routers.adguard.tls.certresolver: "letsencrypt"
      traefik.http.routers.adguard.tls.domains[0].main: "adguard.{{ internal_domain }}"
      traefik.http.routers.adguard.service: "adguard"
      traefik.http.services.adguard.loadbalancer.server.port: "3000"

      # DNS-over-HTTPS (DoH)
      traefik.http.routers.adguard-doh.rule: "Host(`adguard.{{ internal_domain }}`)&&Path(`/dns-query`)"
      traefik.http.routers.adguard-doh.entrypoints: "websecure"
      traefik.http.routers.adguard-doh.tls.certresolver: "letsencrypt"
      traefik.http.routers.adguard-doh.tls.domains[0].main: "adguard.{{ internal_domain }}"
      traefik.http.routers.adguard-doh.service: "adguard-doh"
      traefik.http.services.adguard-doh.loadbalancer.server.port: "8444"

      # DNS-over-TLS (DoT)
      traefik.tcp.routers.adguard-dot.rule: "HostSNI(`adguard.{{ internal_domain }}`)"
      traefik.tcp.routers.adguard-dot.entrypoints: "dns-over-tls"
      traefik.tcp.routers.adguard-dot.tls.certresolver: "letsencrypt"
      traefik.tcp.routers.adguard-dot.tls.domains[0].main: "adguard.{{ internal_domain }}"
      traefik.tcp.routers.adguard-dot.service: "adguard-dot"
      traefik.tcp.services.adguard-dot.loadbalancer.server.port: "8530"

      # DNS-over-QUIC (DoQ)
      traefik.udp.routers.adguard-doq.entrypoints: "dns-over-quic"
      traefik.udp.routers.adguard-doq.service: "adguard-doq"
      traefik.udp.services.adguard-doq.loadbalancer.server.port: "8531"

    quadlet_options:
      - |
        [Service]
        Restart=on-failure
        TimeoutStopSec=70

        [Install]
        WantedBy=default.target

  register: adguardhome_service_unit
  notify: Reload systemd daemons for adguard role

- name: Flush the handlers for adguard role
  ansible.builtin.meta: flush_handlers

- name: Enable and start adguardhome service
  ansible.builtin.systemd_service:
    name: adguardhome
    enabled: true
    state: started
